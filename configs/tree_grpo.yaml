hydra:
  searchpath:
    - file://${oc.env:ROOT_DIR}/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  custom_cls:
    path: "pkg://src.data.hotpot_local_dataset"
    name: "HotpotLocalDataset"
  train_files: "data/hotpotqa/local/queries.train.jsonl"
  val_files: "data/hotpotqa/local/queries.val.jsonl"
  train_batch_size: 32
  val_batch_size: null
  max_prompt_length: 2048
  max_response_length: 4096
  return_raw_chat: true
  filter_overlong_prompts: true
  truncation: error

tools:
  - class_name: "src.policy.tools.local_search.LocalEmbeddingSearchTool"
    config:
      type: native
      retrieval_service_url: "http://127.0.0.1:8765/search"
      topk_default: 3
      timeout: 360
      return_scores: true

actor_rollout_ref:
  model:
    path: "models/Qwen3-4B"
    use_remove_padding: true
    enable_gradient_checkpointing: true
  rollout:
    name: sglang
    prompt_length: ${oc.select:data.max_prompt_length}
    response_length: ${oc.select:data.max_response_length}
    log_prob_micro_batch_size_per_gpu: 8
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    disable_log_stats: false
    # n = ts_m (number of trees per prompt)
    n: 2
    val_kwargs:
      temperature: 0.0
      do_sample: false
    multi_turn:
      enable: true
      format: search_r1
      max_assistant_turns: 4
      max_parallel_calls: 512
      max_tool_response_length: 4096
      tool_config_path: "configs/local_search_tree_grpo.yaml"
      dynamic_prompt:
        enable: false
      custom_tooling:
        enable: false
    # Tree search configuration (matching original Tree-GRPO algorithm)
    # Training budget: M × K = 2 × 4 = 8 samples/prompt (= standard group_size=8)
    # Leaves per tree: 1 (initial chain) + N × L = 1 + 2 × 2 = 5, sample K=4
    # Algorithm:
    #   Step 1: Run full chain from root (up to max_turns steps)
    #   Step 2: For L=2 iterations, select N=2 non-leaf nodes and run full chains
    #   Step 3: Sample K=4 leaves per tree → 2 trees × 4 = 8 training samples
    custom:
      tree_search:
        enable: true
        ts_m: 2        # Number of trees per prompt (= rollout.n)
        ts_n: 2        # Nodes to expand per iteration (selected from non-leaf nodes)
        ts_l: 2        # Number of expansion iterations (produces 1+N*L=5 leaves/tree)
        ts_k: 4        # Leaves to sample per tree
        expand_mode: random
        topk: 3        # Top-k docs per search query (passed to tool)
        max_turns: 4   # Max assistant turns per trajectory (= max tree depth)
    agent:
      default_agent_loop: tool_agent
      agent_loop_config_path: "configs/agent_loop/qwen_tool_agent_loop.yaml"
      agent_loop_manager_class: "src.policy.tree_search.tree_search_manager.TreeSearchAgentLoopManager"
  ref:
    log_prob_micro_batch_size_per_gpu: 8
  actor:
    use_kl_loss: false
    kl_loss_coef: 0.000
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    clip_ratio_low: 0.20
    clip_ratio_high: 0.28
    ppo_micro_batch_size_per_gpu: 2
    ppo_mini_batch_size: 16
    optim:
      lr: 3e-6
      lr_warmup_steps: 20

algorithm:
  adv_estimator: tree_grpo

reward_manager:
  source: register
  name: naive

custom_reward_function:
  path: "src/reward/exact_match_reward.py"
  name: compute_score

trainer:
  project_name: "local_search_tree_grpo"
  experiment_name: "qwen3-4b-hotpot-local-TreeGRPO"
  max_actor_ckpt_to_keep: 100
  val_before_train: false
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 20
  test_freq: 20
  log_step_interval: 1
  log_var_generations: 10
  total_epochs: 1
  logger: ["console","swanlab"]
