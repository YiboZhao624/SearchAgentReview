hydra:
  searchpath:
    - file://${oc.env:ROOT_DIR}/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  prompt_format: "hermes"
  custom_cls:
    path: "pkg://src.data.hotpot_local_dataset"
    name: "HotpotLocalDataset"
  train_files: "data/unified_hotpot_format/mixed/train_mixed_9000.jsonl"
  val_files: "data/unified_hotpot_format/mixed/val_mixed_900.jsonl"
  train_batch_size: 32
  val_batch_size: null
  max_prompt_length: 2048
  max_response_length: 4096
  return_raw_chat: true
  filter_overlong_prompts: true
  truncation: error

tools:
  - class_name: "src.policy.tools.local_search.LocalEmbeddingSearchTool"
    config:
      type: native
      retrieval_service_url: "http://127.0.0.1:8765/search"
      topk_default: 3
      timeout: 360
      return_scores: true

actor_rollout_ref:
  model:
    path: "models/Qwen3-8B"
    use_remove_padding: true
    enable_gradient_checkpointing: true
  rollout:
    name: sglang
    prompt_length: ${oc.select:data.max_prompt_length}
    response_length: ${oc.select:data.max_response_length}
    log_prob_micro_batch_size_per_gpu: 8
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
    disable_log_stats: false
    n: 8
    val_kwargs:
      temperature: 0.0
      do_sample: false
    multi_turn:
      enable: true
      format: hermes
      max_assistant_turns: 4
      max_parallel_calls: 512
      max_tool_response_length: 4096
      tool_config_path: "configs/local_search_gigpo.yaml"
      # async_step_reward=false: no LLM step scoring needed;
      # AsyncToolScoreQwenToolAgentLoop still runs to collect anchor_obs_list.
      async_step_reward: false
    agent:
      default_agent_loop: qwen_tool_agent_async_step
      agent_loop_config_path: "configs/agent_loop/qwen_tool_agent_loop_async_step.yaml"
      agent_loop_manager_class: "src.policy.agent_loop.async_tool_score_agent_loop_manager.AsyncToolScoreAgentLoopManager"
  ref:
    log_prob_micro_batch_size_per_gpu: 8
  actor:
    use_kl_loss: false
    entropy_coeff: 0
    clip_ratio_low: 0.20
    clip_ratio_high: 0.28
    ppo_micro_batch_size_per_gpu: 2
    ppo_mini_batch_size: 16
    optim:
      lr: 3e-6
      lr_scheduler_type: constant
      lr_warmup_steps: 20

algorithm:
  adv_estimator: grpo_gigpo
  gigpo:
    gamma: 0.9                       # discount factor for step-level returns (Eq. 5)
    step_advantage_w: 1.0            # weight for step advantage (Eq. 8)
    mode: mean_std_norm              # mean_std_norm | mean_norm
    enable_similarity: true          # false = exact-match grouping only
    similarity_method: sequence_matcher
    similarity_thresh: 0.9          # SequenceMatcher ratio threshold
    compute_mean_std_cross_steps: true  # GiGPO Eq. 3: count each traj T_i times

reward_manager:
  source: register
  name: naive

trainer:
  project_name: "local_search_gigpo"
  experiment_name: "qwen3-8b-mix-gigpo"
  max_actor_ckpt_to_keep: 100
  val_before_train: false
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 20
  test_freq: 20
  log_step_interval: 1
  log_var_generations: 10
  total_epochs: 1
  logger: ["console", "swanlab"]
  checkpoint:
    save_contents: ["model", "extra"]
